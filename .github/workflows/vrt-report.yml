name: VRT Report

# Posts the VRT failure comment with image diffs. Runs via workflow_run so it
# executes from the trusted default-branch code in the base-repo context: the
# write-scoped token (contents/pull-requests) NEVER touches PR-controlled code.
# It consumes only the `vrt-report-bundle` artifact (images) uploaded by the
# read-only VRT job, and resolves the PR number from the trusted head SHA — not
# from any artifact-supplied value. Because it is decoupled from the untrusted
# job, this also works for fork PRs (the old in-run report job could not, since
# fork tokens are read-only).
#
# Note: workflow_run only fires once this file is on the default branch.

# workflow_run here is the isolation boundary, not a vulnerability: the job
# below runs trusted default-branch code and consumes ONLY the uploaded artifact
# (never PR-controlled code), and resolves the PR from a trusted SHA. zizmor's
# dangerous-triggers audit flags the trigger class generically — suppressed with
# justification.
on: # zizmor: ignore[dangerous-triggers]
  workflow_run:
    workflows: [VRT]
    types: [completed]

permissions: {}

concurrency:
  group: vrt-report-${{ github.event.workflow_run.head_repository.full_name }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  report:
    name: Post VRT failure report
    # Only for failed VRT runs that came from a pull request.
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read # download the bundle artifact from the triggering run
      contents: write # host images on the vrt-report branch
      pull-requests: write # upsert the PR comment
    steps:
      # Trusted report script comes from the default branch, not the PR.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # The VRT job only uploads the bundle on a visual-diff failure. A failure
      # for any other reason (install, infra) has no bundle — skip cleanly.
      - name: Check for report bundle
        id: bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          count="$(gh api "repos/${REPO}/actions/runs/${RUN_ID}/artifacts" \
            --jq '[.artifacts[] | select(.name == "vrt-report-bundle")] | length')"
          if [ "$count" -gt 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No vrt-report-bundle artifact; nothing to report."
          fi

      - name: Download report bundle
        if: steps.bundle.outputs.exists == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vrt-report-bundle
          path: vrt-report-bundle
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        if: steps.bundle.outputs.exists == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Build and post VRT failure report
        if: steps.bundle.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          # PR number is resolved from this trusted SHA inside the script — the
          # untrusted bundle never dictates which PR gets commented on.
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          VRT_ATTACH_DIR: vrt-report-bundle/attachments
          VRT_BASELINE_DIR: vrt-report-bundle/baselines
        run: node scripts/vrt-report.mjs
