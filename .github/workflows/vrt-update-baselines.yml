name: VRT Update Baselines

# Manually regenerate the committed VRT baselines in the same digest-pinned
# Playwright image the VRT check uses, and commit them back to the target
# branch. Use this when an intentional UI change requires new baselines and you
# cannot run `pnpm vrt:update` locally.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to regenerate baselines on and commit back to
        required: true

permissions: {}

concurrency:
  group: vrt-update-baselines-${{ inputs.branch }}
  cancel-in-progress: false

jobs:
  update:
    name: Regenerate baselines
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.branch }}
          persist-credentials: false

      # Use mise (pnpm pinned in mise.toml); the container ships Node 24.
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate baselines
        run: pnpm --filter website test:vrt:update

      - name: Commit and push updated baselines
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ inputs.branch }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/website/tests/vrt/__screenshots__
          if git diff --cached --quiet; then
            echo "No baseline changes."
            exit 0
          fi
          git commit -m "test(frontend): update VRT baselines [skip ci]"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${BRANCH}"
