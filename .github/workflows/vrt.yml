name: VRT

on:
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: vrt-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vrt:
    name: Visual Regression
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    # Digest-pinned Playwright image: provides Chromium + system fonts (incl.
    # Japanese IPAGothic) so renders match `pnpm vrt:update`. Keep this digest
    # in sync with scripts/vrt-update.sh.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # Use mise (pnpm pinned in mise.toml) instead of an unpinned global
      # install — same as the build/lint workflows. The container ships Node 24.
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Chromium is already present in the image (PLAYWRIGHT_BROWSERS_PATH),
      # so no `playwright install` is needed.
      - name: Run visual regression tests
        run: pnpm --filter website test:vrt

      # On failure, assemble a self-contained bundle (failure attachments +
      # the baselines they were compared against). The privileged report runs
      # in a separate workflow_run workflow (vrt-report.yml) that consumes ONLY
      # this bundle — it never executes PR-controlled code. See vrt-report.yml.
      - name: Assemble VRT report bundle
        if: ${{ failure() }}
        # Container `run:` steps default to sh (dash), which rejects
        # `set -o pipefail`; force bash so this step works on real VRT failures.
        shell: bash
        run: |
          set -euo pipefail
          # No attachments => not a visual-diff failure (e.g. install error).
          # Skip so the report workflow isn't triggered for nothing.
          if [ ! -d apps/website/.vitest-attachments ]; then
            echo "No VRT attachments; skipping report bundle."
            exit 0
          fi
          bundle="$RUNNER_TEMP/vrt-report-bundle"
          mkdir -p "$bundle/attachments" "$bundle/baselines"
          cp -a apps/website/.vitest-attachments/. "$bundle/attachments/"
          if [ -d apps/website/tests/vrt/__screenshots__ ]; then
            cp -a apps/website/tests/vrt/__screenshots__/. "$bundle/baselines/"
          fi
          echo "VRT_BUNDLE_DIR=$bundle" >> "$GITHUB_ENV"

      - name: Upload report bundle on failure
        if: ${{ failure() && env.VRT_BUNDLE_DIR != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vrt-report-bundle
          path: ${{ env.VRT_BUNDLE_DIR }}
          include-hidden-files: true
          if-no-files-found: ignore
