name: VRT

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  vrt:
    name: Visual Regression
    runs-on: ubuntu-latest
    # Digest-pinned Playwright image: provides Chromium + system fonts (incl.
    # Japanese IPAGothic) so renders match `pnpm vrt:update`. Keep this digest
    # in sync with scripts/vrt-update.sh.
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble@sha256:9bd26ad900bb5e0f4dee75839e957a89ae89c2b7ab1e76050e559790e946b948
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm
        run: npm install -g pnpm@11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Chromium is already present in the image (PLAYWRIGHT_BROWSERS_PATH),
      # so no `playwright install` is needed.
      - name: Run visual regression tests
        run: pnpm --filter website test:vrt

      - name: Upload diff artifacts on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vrt-failure-images
          path: apps/website/.vitest-attachments/
          if-no-files-found: ignore

  report:
    name: Report failures
    needs: vrt
    if: ${{ always() && needs.vrt.result == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vrt-failure-images
          path: apps/website/.vitest-attachments

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Build and post VRT failure report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: node scripts/vrt-report.mjs
