commit-msg:
  parallel: true
  jobs:
    - name: commitlint
      run: pnpm run commitlint --edit {1}

pre-commit:
  parallel: true
  jobs:
    - name: lint GitHub Actions
      glob: ".github/**/*.{yaml,yml}"
      run: mise run actions:lint
    - name: lock mise tools
      glob: "mise.toml"
      run: mise lock
      stage_fixed: true

pre-push:
  parallel: true
  jobs:
    - name: check-branch
      run: |
        # Prevent direct pushes to main branch
        branch=$(git rev-parse --abbrev-ref HEAD)
        if [ "$branch" = "main" ]; then
          echo "❌ Direct push to main branch is not allowed!"
          echo "Please create a feature branch and open a pull request."
          exit 1
        fi

post-checkout:
  parallel: true
  jobs:
    - name: mise-install
      glob: "mise.toml"
      run: mise install

post-merge:
  parallel: true
  jobs:
    - name: mise-install
      glob: "mise.toml"
      run: mise install
